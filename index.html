<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <title>Digital Time Keeper</title>
</head>

<body class="bg-neutral-300 text-black dark:bg-slate-800 dark:text-white transition-colors duration-500 font-mono min-h-screen flex flex-col">

    <header>
        <h1 class="text-4xl text-center underline decoration-black dark:decoration-white underline-offset-8">Digital Time Keeper</h1>
    </header>


    <main>
        <p class="text-3xl text-center m-8" id="timeFormat"></p>

        <div class="flex flex-col items-center justify-center overflow-hidden">

            <div
                class="flex items-center justify-center m-12 h-96 w-96 rounded-full border-8  border-black dark:border-white bg-[url(/images/blank-clock.png)] bg-cover">

                <div id="clock-display" class="text-4xl font-bold border-2 rounded-2xl px-4 border-black dark:border-white backdrop-blur-sm bg-white/30 dark:bg-black/30" ></div>

            </div>
            <p id="date" class="text-2xl text-center m-4"></p>
            <div class="flex justify-center mb-8 gap-4">
                <button type="button" id="timeChange"
                    class="border rounded-full px-6 py-2 bg-blue-400 hover:bg-red-400 transition-colors">
                    Change Format
                </button>
                <button type="button" id="darkModeBtn"
                    class="border rounded-full px-6 py-2 bg-gray-400 hover:bg-gray-200 transition-colors ">
                    Dark Mode
                </button>
            </div>
        </div>
    </main>


    <footer class="w-full py-10 text-center">
    <p class="text-sm text-zinc-500 dark:text-zinc-400 font-medium tracking-wide">
        Designed & Built by 
        <span class="text-black dark:text-white border-b border-blue-500 pb-0.5">
            William Tolar
        </span>
    </p>
</footer>


    <script src="script.js"></script>
</body>


</html>
