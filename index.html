<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <title>Digital Time Keeper</title>
</head>

<body class="bg-white text-black dark:bg-slate-900 dark:text-white transition-colors duration-500 font-mono">

    <header>
        <h1 class="text-4xl text-center underline ">Digital Time Keeper</h1>
    </header>


    <main>
        <p class="text-3xl text-center m-8" id="timeFormat"></p>

        <div class="flex flex-col items-center justify-center overflow-hidden">

            <div
                class="flex items-center justify-center m-8 h-96 w-96 rounded-full border-8  border-black dark:border-white bg-[url(/images/blank-clock.png)] bg-cover">

                <div id="clock-display" class="text-4xl font-bold border-2 rounded-full px-4 border-black dark:border-white"></div>

            </div>
            <p id="date" class="text-2xl text-center m-4"></p>
            <div class="flex justify-center mb-8 gap-4">
                <button type="button" id="timeChange"
                    class="border rounded-full px-6 py-2 bg-blue-400 hover:bg-red-400 transition-colors">
                    Change Format
                </button>
                <button type="button" id="darkModeBtn"
                    class="border rounded-full px-6 py-2 bg-gray-200 hover:bg-gray-300 transition-colors">
                    Dark Mode
                </button>
            </div>
        </div>
    </main>



    <script src="script.js"></script>
</body>


</html>
